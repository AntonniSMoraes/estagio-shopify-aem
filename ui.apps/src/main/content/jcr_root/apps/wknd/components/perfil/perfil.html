<div data-sly-use.model="com.adobe.aem.guides.wknd.core.models.PerfilModel" class="cmp-perfil">
    <div class="cmp-perfil__content">
        <h2 class="cmp-perfil__name">${model.nome || 'Nome não definido'}</h2>
        
        <h4 class="cmp-perfil__role" data-sly-test="${model.cargo}">
            ${model.cargo}
        </h4>
        
        <p class="cmp-perfil__bio">${model.bio}</p>
    </div>
</div>
